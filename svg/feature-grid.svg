<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="650" viewBox="0 0 1200 650"
     xmlns="http://www.w3.org/2000/svg"
     font-family="'Inter', system-ui, -apple-system, sans-serif">

  <defs>
    <!-- Standard card shadow -->
    <filter id="s" x="-6%" y="-8%" width="112%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4"
                    flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <!-- Headliner card shadow (stronger) -->
    <filter id="sa" x="-6%" y="-8%" width="112%" height="122%">
      <feDropShadow dx="0" dy="3" stdDeviation="6"
                    flood-color="#d97757" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="1200" height="650" fill="#ffffff"/>

  <!-- ── HEADER ── -->
  <text x="600" y="57"
        text-anchor="middle"
        font-size="32" font-weight="700"
        fill="#0a0e27" letter-spacing="-0.4">What makes this different</text>
  <rect x="570" y="83" width="60" height="2" rx="1" fill="#d97757"/>

  <!-- ══════════════════════════════════════════════════════════
       ROW 1  (card_y = 140)
       icon center_y = 182  |  title_y = 236  |  d1 = 260  |  d2 = 278
  ══════════════════════════════════════════════════════════ -->

  <!-- ── CARD 1: Hands-Free Voice Loop  x=80 ── -->
  <rect x="80" y="140" width="340" height="200" rx="12" ry="12"
        fill="#ffffff" stroke="#e5e5e5" stroke-width="1" filter="url(#s)"/>
  <!-- Mic: capsule -->
  <rect x="242" y="161" width="16" height="26" rx="8" ry="8"
        fill="none" stroke="#d97757" stroke-width="2"/>
  <!-- Mic: stand arc -->
  <path d="M242,187 C242,198 258,198 258,187"
        fill="none" stroke="#d97757" stroke-width="2" stroke-linecap="round"/>
  <!-- Mic: pole -->
  <line x1="250" y1="198" x2="250" y2="203"
        stroke="#d97757" stroke-width="2" stroke-linecap="round"/>
  <!-- Mic: base bar -->
  <line x1="243" y1="203" x2="257" y2="203"
        stroke="#d97757" stroke-width="2" stroke-linecap="round"/>
  <!-- Mic: left wave -->
  <path d="M238,172 C235,176 235,183 238,187"
        fill="none" stroke="#d97757" stroke-width="2" stroke-linecap="round"/>
  <!-- Mic: right wave -->
  <path d="M262,172 C265,176 265,183 262,187"
        fill="none" stroke="#d97757" stroke-width="2" stroke-linecap="round"/>

  <text x="250" y="236" text-anchor="middle"
        font-size="16" font-weight="700" fill="#0a0e27">Hands-Free Voice Loop</text>
  <text x="250" y="260" text-anchor="middle"
        font-size="12" fill="#6a6a7a">Talk, hear answers, continue</text>
  <text x="250" y="278" text-anchor="middle"
        font-size="12" fill="#6a6a7a">with gloves on</text>


  <!-- ── CARD 2: Photo Diagnosis  x=440 ── -->
  <rect x="440" y="140" width="340" height="200" rx="12" ry="12"
        fill="#ffffff" stroke="#e5e5e5" stroke-width="1" filter="url(#s)"/>
  <!-- Camera: viewfinder bump -->
  <rect x="602" y="160" width="16" height="8" rx="3" ry="3"
        fill="none" stroke="#d97757" stroke-width="2"/>
  <!-- Camera: body -->
  <rect x="588" y="168" width="44" height="30" rx="5" ry="5"
        fill="none" stroke="#d97757" stroke-width="2"/>
  <!-- Camera: lens outer -->
  <circle cx="610" cy="183" r="9"
          fill="none" stroke="#d97757" stroke-width="2"/>
  <!-- Camera: lens inner -->
  <circle cx="610" cy="183" r="4"
          fill="none" stroke="#d97757" stroke-width="1.5"/>

  <text x="610" y="236" text-anchor="middle"
        font-size="16" font-weight="700" fill="#0a0e27">Photo Diagnosis</text>
  <text x="610" y="260" text-anchor="middle"
        font-size="12" fill="#6a6a7a">Three-layer grounding: matcher,</text>
  <text x="610" y="278" text-anchor="middle"
        font-size="12" fill="#6a6a7a">image-bytes, chart positions</text>


  <!-- ── CARD 3: Memory Across Sessions  x=800 ── -->
  <rect x="800" y="140" width="340" height="200" rx="12" ry="12"
        fill="#ffffff" stroke="#e5e5e5" stroke-width="1" filter="url(#s)"/>
  <!-- Brain: left lobe -->
  <path d="M970,163 L958,165
           C944,168 940,178 942,185
           C944,193 952,197 962,196
           L970,194"
        fill="none" stroke="#d97757" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Brain: right lobe -->
  <path d="M970,163 L982,165
           C996,168 1000,178 998,185
           C996,193 988,197 978,196
           L970,194"
        fill="none" stroke="#d97757" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Brain: center divider -->
  <path d="M970,163 C972,171 968,180 970,187 L970,194"
        fill="none" stroke="#d97757" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Brain: left sulcus -->
  <path d="M952,173 C950,179 951,186 954,190"
        fill="none" stroke="#d97757" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Brain: right sulcus -->
  <path d="M988,173 C990,179 989,186 986,190"
        fill="none" stroke="#d97757" stroke-width="1.5" stroke-linecap="round"/>

  <text x="970" y="236" text-anchor="middle"
        font-size="16" font-weight="700" fill="#0a0e27">Memory Across Sessions</text>
  <text x="970" y="260" text-anchor="middle"
        font-size="12" fill="#6a6a7a">Remembers your setup</text>
  <text x="970" y="278" text-anchor="middle"
        font-size="12" fill="#6a6a7a">between sessions</text>


  <!-- ══════════════════════════════════════════════════════════
       ROW 2  (card_y = 370)
       icon center_y = 412  |  title_y = 466  |  d1 = 490  |  d2 = 508
  ══════════════════════════════════════════════════════════ -->

  <!-- ── CARD 4: Guided Walkthroughs  x=80 ── -->
  <rect x="80" y="370" width="340" height="200" rx="12" ry="12"
        fill="#ffffff" stroke="#e5e5e5" stroke-width="1" filter="url(#s)"/>
  <!-- Checklist: outer rect -->
  <rect x="228" y="390" width="44" height="40" rx="3" ry="3"
        fill="none" stroke="#d97757" stroke-width="2"/>
  <!-- Checklist: row 1 -->
  <path d="M232,401 L236,405 L243,398"
        fill="none" stroke="#d97757" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="247" y1="403" x2="267" y2="403"
        stroke="#d97757" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Checklist: row 2 -->
  <path d="M232,412 L236,416 L243,409"
        fill="none" stroke="#d97757" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="247" y1="414" x2="267" y2="414"
        stroke="#d97757" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Checklist: row 3 -->
  <path d="M232,423 L236,427 L243,420"
        fill="none" stroke="#d97757" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="247" y1="425" x2="267" y2="425"
        stroke="#d97757" stroke-width="1.5" stroke-linecap="round"/>

  <text x="250" y="466" text-anchor="middle"
        font-size="16" font-weight="700" fill="#0a0e27">Guided Walkthroughs</text>
  <text x="250" y="490" text-anchor="middle"
        font-size="12" fill="#6a6a7a">Step-by-step with mistake</text>
  <text x="250" y="508" text-anchor="middle"
        font-size="12" fill="#6a6a7a">prevention and validation</text>


  <!-- ── CARD 5: Multi-Agent Deliberation  x=440  HEADLINER ── -->
  <rect x="440" y="370" width="340" height="200" rx="12" ry="12"
        fill="#fff8f5" stroke="#d97757" stroke-width="2" filter="url(#sa)"/>
  <!-- Nodes: connecting lines first (behind circles) -->
  <!-- TL ↔ TR -->
  <line x1="606" y1="400" x2="618" y2="400"
        stroke="#d97757" stroke-width="2.5" stroke-linecap="round"/>
  <!-- TL ↘ B -->
  <line x1="601" y1="407" x2="605" y2="419"
        stroke="#d97757" stroke-width="2.5" stroke-linecap="round"/>
  <!-- TR ↙ B -->
  <line x1="623" y1="407" x2="619" y2="419"
        stroke="#d97757" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Nodes: top-left -->
  <circle cx="599" cy="400" r="7"
          fill="#fff8f5" stroke="#d97757" stroke-width="2.5"/>
  <!-- Nodes: top-right -->
  <circle cx="625" cy="400" r="7"
          fill="#fff8f5" stroke="#d97757" stroke-width="2.5"/>
  <!-- Nodes: bottom center -->
  <circle cx="612" cy="426" r="7"
          fill="#fff8f5" stroke="#d97757" stroke-width="2.5"/>

  <text x="610" y="466" text-anchor="middle"
        font-size="16" font-weight="700" fill="#d97757">Multi-Agent Deliberation</text>
  <text x="610" y="490" text-anchor="middle"
        font-size="12" fill="#6a6a7a">Three agents coordinate on every</text>
  <text x="610" y="508" text-anchor="middle"
        font-size="12" fill="#6a6a7a">query with visible reasoning</text>


  <!-- ── CARD 6: Customer-Ready Packaging  x=800 ── -->
  <rect x="800" y="370" width="340" height="200" rx="12" ry="12"
        fill="#ffffff" stroke="#e5e5e5" stroke-width="1" filter="url(#s)"/>
  <!-- Shield: outline -->
  <path d="M970,390 L985,396 L985,411
           C985,423 978,430 970,433
           C962,430 955,423 955,411
           L955,396 Z"
        fill="none" stroke="#d97757" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Shield: checkmark -->
  <path d="M961,412 L967,418 L980,405"
        fill="none" stroke="#d97757" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round"/>

  <text x="970" y="466" text-anchor="middle"
        font-size="16" font-weight="700" fill="#0a0e27">Customer-Ready Packaging</text>
  <text x="970" y="490" text-anchor="middle"
        font-size="12" fill="#6a6a7a">Customer Mode, confidence scoring,</text>
  <text x="970" y="508" text-anchor="middle"
        font-size="12" fill="#6a6a7a">graceful failure, onboarding tour</text>


  <!-- ── CREDIT LINE ── -->
  <text x="600" y="620" text-anchor="middle"
        font-size="11" fill="#9a9a9a">
    vikas kumar · prox founding engineer challenge
  </text>

</svg>
